name: UTS CI Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    name: 🏗️ Build & Lint Verification
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'package-lock.json'

    - name: 📦 Install dependencies
      run: npm install

    - name: 🔍 Type-Check (TS Lint)
      run: npm run lint

    - name: 🔍 ESLint Code Quality
      run: |
        npm install -g eslint
        eslint src/**/*.ts src/**/*.tsx src/gas/**/*.js || true

    - name: 🏗️ Verify Production Build
      run: |
        npm run build
        node build-gas.js
