name: UTS CI Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    name: 🏗️ Build & Lint Verification
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'Universal-Task-Structurer/package-lock.json'

    - name: 📦 Install dependencies
      working-directory: ./Universal-Task-Structurer
      run: npm install

    - name: 🔍 Type-Check (Lint)
      working-directory: ./Universal-Task-Structurer
      run: npm run lint

    - name: 🏗️ Verify Production Build
      working-directory: ./Universal-Task-Structurer
      run: npm run build
