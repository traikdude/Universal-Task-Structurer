name: Weekly Security Audit

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at 00:00 UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  audit:
    name: 🛡️ Security Audit
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'package-lock.json'

    - name: 📦 Install dependencies
      run: npm install

    - name: 🛡️ Security Audit
      run: npm audit || true

    - name: 📊 Generate Report
      run: |
        echo "# Security Scan Report" > SECURITY_REPORT.md
        echo "**Date:** $(date)" >> SECURITY_REPORT.md
        echo "**Status:** Completed" >> SECURITY_REPORT.md
        echo "" >> SECURITY_REPORT.md
        echo "### NPM Audit Summary" >> SECURITY_REPORT.md
        npm audit >> SECURITY_REPORT.md || true

    - name: 💾 Commit Report
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add SECURITY_REPORT.md
        git commit -m "📊 Weekly security scan report" || true
        git push
